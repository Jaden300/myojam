services:
  - type: web
    name: myosignal-api
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
```

**Frontend — set the API URL for production.** Right now it points to `localhost`. Create `frontend/.env.development` and `frontend/.env.production`:

`.env.development`:
```
VITE_API_URL=http://127.0.0.1:8000
```

`.env.production`:
```
VITE_API_URL=https://myosignal-api.onrender.com